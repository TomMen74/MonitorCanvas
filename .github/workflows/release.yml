name: Windows-Pakete erstellen

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versionsnummer, zum Beispiel 0.2.0"
        required: true
        default: "0.2.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Quellcode laden
        uses: actions/checkout@v4

      - name: Versionsnummer bestimmen
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          "number=$version" >> $env:GITHUB_OUTPUT

      - name: Programmstarter kompilieren
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          if not exist dist mkdir dist
          cl /nologo /O2 /MT /std:c++17 /DUNICODE /D_UNICODE /EHsc launcher\MonitorCanvas.cpp /Fe:dist\MonitorCanvas.exe /link /SUBSYSTEM:WINDOWS shell32.lib user32.lib

      - name: Programmdateien zusammenstellen
        shell: pwsh
        run: |
          Copy-Item server.ps1,index.html,app.js,styles.css,README.md,LICENSE.txt dist
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path dist\* -DestinationPath "release\MonitorCanvas-${{ steps.version.outputs.number }}-Portable.zip" -Force

      - name: Inno Setup installieren
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Windows-Installer erstellen
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.number }} installer\MonitorCanvas.iss

      - name: Pakete als Workflow-Ergebnis speichern
        uses: actions/upload-artifact@v4
        with:
          name: MonitorCanvas-${{ steps.version.outputs.number }}-Windows
          path: release/*

      - name: GitHub Release veröffentlichen
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: MonitorCanvas ${{ steps.version.outputs.number }}
          generate_release_notes: true
          files: release/*
