name: Windows-Pakete erstellen

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versionsnummer, zum Beispiel 1.0.0"
        required: true
        default: "1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Quellcode laden
        uses: actions/checkout@v4

      - name: Versionsnummer bestimmen
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          "number=$version" >> $env:GITHUB_OUTPUT

      - name: Programmstarter kompilieren
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $compiler = "$env:WINDIR\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          if (-not (Test-Path $compiler)) {
            throw "Der Windows C#-Compiler wurde nicht gefunden."
          }
          & $compiler /nologo /target:winexe /optimize+ `
            /reference:System.Windows.Forms.dll `
            /out:dist\MonitorCanvas.exe `
            launcher\MonitorCanvas.cs

      - name: Programmdateien zusammenstellen
        shell: pwsh
        run: |
          Copy-Item server.ps1,index.html,app.js,styles.css,README.md,LICENSE.txt dist
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path dist\* -DestinationPath "release\MonitorCanvas-${{ steps.version.outputs.number }}-Portable.zip" -Force

      - name: Inno Setup installieren
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Windows-Installer erstellen
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.number }} installer\MonitorCanvas.iss

      - name: Pakete als Workflow-Ergebnis speichern
        uses: actions/upload-artifact@v4
        with:
          name: MonitorCanvas-${{ steps.version.outputs.number }}-Windows
          path: release/*

      - name: GitHub Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.number }}
          target_commitish: ${{ github.sha }}
          name: MonitorCanvas ${{ steps.version.outputs.number }}
          generate_release_notes: true
          make_latest: true
          files: release/*
